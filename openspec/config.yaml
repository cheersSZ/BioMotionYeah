schema: spec-driven

# Project context shown to AI when creating artifacts.
context: |
  Project: BioMotion — real-time musculoskeletal analysis iOS app.

  Pipeline (per-frame, ~60 Hz target):
    ARKit (91 joints) → 1-euro filter → Nimble IK (~1 ms)
      → Nimble ID (~0.1 ms) → moment arms via FK + numerical diff
      → OSQP muscle static optimization (~0.5 ms)
      → RealityKit muscle visualization (28 capsules of 80 muscles)

  Tech stack:
    - Swift 5.9+, SwiftUI, RealityKit, ARKit body tracking (iOS 17+)
    - C++17 via ObjC++ bridges in BioMotion/Nimble/ and BioMotion/Muscle/
    - Vendored nimblephysics (patched for iOS — grep DART_IOS_BUILD)
    - OSQP for QP, Eigen 3.4.0 (vendored), tinyxml2 (vendored)
    - Project generated by XcodeGen from project.yml — never hand-edit BioMotion.xcodeproj
    - Model: Rajagopal2016.osim (80 muscles, 39 DOFs, 66 markers)

  Architecture conventions:
    - Pipeline orchestration on background queue: BioMotion/Nimble/NimbleEngine.swift
    - Swift ↔ C++ bridges live in BioMotion/Nimble/ (NimbleBridge, MomentArmComputer)
      and BioMotion/Muscle/ (MuscleSolver). Bridging header at BioMotion/Nimble/BioMotion-Bridging-Header.h.
    - ARKit joints map to virtual markers at body-node origins (NOT the model's surface markers).
    - Use C++ try/catch only — ObjC @try/@catch does NOT catch std::exception or SIGSEGV.
    - Library search paths must be SDK-conditional in project.yml ([sdk=iphoneos*] vs [sdk=iphonesimulator*]).
    - Bump CURRENT_PROJECT_VERSION in project.yml before every TestFlight upload.
    - After any project.yml edit: run `xcodegen generate`.

  Past milestones (already shipped, reference only):
    M1 SG smoothing · M2 full-body markers + scaling · M3+M4 GRF via near-CoP multi-contact ID
    M5 real muscle pipeline (FK moment arms + soft QP + Hill) · M6 persistent OSQP workspace

  Authoritative LLM context: ./CLAUDE.md (architecture + gotchas).
  Build/setup/TestFlight commands: ./README.md.

# Per-artifact rules
rules:
  proposal:
    - State the user-visible or pipeline-level outcome before the technical change.
    - Always include a "Non-goals" section to keep scope tight.
    - Call out any new C++/ObjC++ bridge surface — these have high integration cost.
  design:
    - Identify which pipeline stage(s) are affected (ARKit / IK / ID / moment arms / QP / viz).
    - Specify thread/queue ownership (main vs NimbleEngine background queue).
    - State target per-frame budget impact (ms) for any change in the hot path.
    - Note any nimblephysics patches required and reference DART_IOS_BUILD guards.
  tasks:
    - Group tasks by layer: project.yml → C++/bridges → Swift pipeline → UI → validation.
    - Include an explicit "xcodegen generate" task after any project.yml change.
    - Include a "validate on device" task — simulator does not run ARKit body tracking.
    - Keep individual tasks <= ~2 hours of focused work.
